<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<title>김가경 국어 · 방학 과제 검사 시스템</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  /* ── 슬레이트×민트 테마 · 그린→네이비, 골드 액센트 유지 ── */
  --green-deep:#2f6b5a; --green-darker:#244e42;
  --gold:#5fc6a3; --gold-soft:#86d6ba; --cream:#e8eef0;
  --bg-dark:#13181d; --bg-card:#1d242b; --bg-card-hover:#27313a;
  --text-primary:#e8eef0; --text-secondary:#9fb0b8; --text-muted:#6f818b;
  --border-soft:rgba(95,198,163,0.22); --border-line:rgba(232,238,240,0.09);
  --danger:#d98a8a; --warn:#86d6ba; --ok:#5fc6a3;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg-dark);color:var(--text-primary);min-height:100vh;line-height:1.7;-webkit-font-smoothing:antialiased}
.wrap{max-width:920px;margin:0 auto;padding:60px 24px 80px}

/* ─── Loading ─── */
.loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg-dark);z-index:1000}
.loading-mark{font-family:'Noto Serif KR',serif;color:var(--gold);font-size:1.5rem;letter-spacing:3px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
.error-box{padding:28px;background:rgba(198,102,102,0.1);border:1px solid var(--danger);border-radius:6px;color:var(--danger);text-align:center;margin:60px 0}

/* ─── Header ─── */
.header{position:relative;text-align:center;margin-bottom:64px;padding-bottom:48px;border-bottom:1px solid var(--border-line)}
.header-watermark{position:absolute;top:-30px;left:50%;transform:translateX(-50%);width:480px;max-width:95%;opacity:0.18;pointer-events:none;z-index:0}
.header-watermark img{width:100%;height:auto;display:block}
.header .brand-row,.header .title,.header .lead{position:relative;z-index:1}
.brand-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:28px}
.brand-name{font-family:'Noto Serif KR',serif;font-weight:700;font-size:1.05rem;color:var(--gold);letter-spacing:1px}
/* 김가경 국어 연구소 — 필기체 로고 (보내주신 오른쪽 라인 버전) */
.brand-logo{display:block;margin:0 auto;width:300px;max-width:78%;height:auto;
  opacity:0.92;filter:drop-shadow(0 2px 10px rgba(0,0,0,0.35));}
/* 모든 화면 오른쪽 상단 고정 로고 (첫 화면=큰 중앙 로고 있을 땐 숨김) */
.corner-logo{position:fixed;top:14px;right:18px;width:128px;max-width:32vw;height:auto;opacity:0.85;z-index:60;pointer-events:none;filter:drop-shadow(0 1px 6px rgba(0,0,0,0.4))}
body.landing .corner-logo{display:none}
@media (max-width:640px){.corner-logo{width:90px;top:10px;right:12px;opacity:0.8}}
@media print{.corner-logo{display:none!important}}
.title{font-family:'Noto Serif KR',serif;font-weight:700;font-size:2.1rem;letter-spacing:-0.5px;margin-bottom:18px;color:var(--cream)}
.title-accent{color:var(--gold)}
.lead{color:var(--text-secondary);font-size:1.02rem;max-width:560px;margin:0 auto;line-height:1.85}

/* ─── Section label ─── */
.section-label{display:flex;align-items:center;gap:14px;margin:0 0 28px;font-family:'Noto Serif KR',serif;font-weight:500;color:var(--gold);font-size:0.92rem;letter-spacing:2px}
.section-label::before,.section-label::after{content:'';height:1px;background:var(--border-soft);flex:1}
.section-label::before{flex:0 0 32px}

/* ─── Cards (수업·주차 선택) ─── */
.exam-list{display:grid;gap:20px;grid-template-columns:1fr}
.exam-card{display:block;background:var(--bg-card);border:1px solid var(--border-line);border-radius:6px;padding:32px 36px;text-decoration:none;color:inherit;transition:border-color 0.2s,background 0.2s,transform 0.2s;position:relative;overflow:hidden;cursor:pointer;width:100%;text-align:left;font-family:inherit}
.exam-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);opacity:0.6;transition:opacity 0.2s,width 0.2s}
.exam-card:hover{background:var(--bg-card-hover);border-color:var(--border-soft);transform:translateY(-2px)}
.exam-card:hover::before{opacity:1;width:4px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:14px;flex-wrap:wrap}
.card-meta-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.card-num{font-family:'Noto Serif KR',serif;font-weight:700;color:var(--gold);font-size:0.78rem;letter-spacing:3px}
.card-grade{font-size:0.72rem;color:var(--text-muted);padding:3px 10px;border:1px solid var(--border-soft);border-radius:11px;letter-spacing:1px}
.card-status{font-size:0.72rem;letter-spacing:0.5px;padding:3px 10px;border-radius:11px}
.card-date{font-size:0.82rem;color:#eafff7;background:rgba(95,198,163,.22);padding:4px 12px;border:1px solid rgba(95,198,163,.55);border-radius:11px;font-weight:700;letter-spacing:0.3px}
.status-active{background:rgba(47,107,82,0.45);color:var(--cream);border:1px solid var(--green-deep)}
.status-tentative{background:rgba(95,198,163,0.12);color:var(--gold-soft);border:1px solid rgba(95,198,163,0.3)}
.status-closed{background:rgba(122,116,102,0.18);color:var(--text-muted);border:1px solid var(--border-soft)}
.card-arrow{font-family:'Noto Serif KR',serif;font-size:1.4rem;color:var(--text-muted);transition:color 0.2s,transform 0.2s;line-height:1;align-self:center}
.exam-card:hover .card-arrow{color:var(--gold);transform:translateX(4px)}
.card-name{font-family:'Noto Serif KR',serif;font-weight:500;font-size:1.32rem;color:var(--cream);margin-bottom:8px;letter-spacing:-0.3px}
.card-desc{color:#c8d3ce;font-size:0.92rem;margin-bottom:20px;font-weight:400;line-height:1.5}
.card-body{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding-top:22px;border-top:1px solid var(--border-line)}
.card-body-block{display:flex;flex-direction:column;gap:8px}
.body-label{font-size:0.72rem;color:var(--text-muted);letter-spacing:1.5px;font-weight:500}
.body-value{font-size:0.88rem;color:var(--text-secondary);line-height:1.65}
.body-value strong{color:var(--cream);font-weight:500}

/* ─── Footer ─── */
.footer{margin-top:72px;padding-top:32px;border-top:1px solid var(--border-line);text-align:center;color:var(--text-muted);font-size:0.82rem;line-height:1.9}
.footer-mark{font-family:'Noto Serif KR',serif;color:var(--gold);font-weight:500;letter-spacing:2px;font-size:0.78rem;margin-bottom:8px;display:block}

/* ─── Diagnostic flow common ─── */
.back-bar{margin-bottom:32px}
.back-link{display:inline-flex;align-items:center;gap:8px;color:var(--text-muted);text-decoration:none;font-size:0.88rem;background:none;border:none;cursor:pointer;font-family:inherit;padding:8px 0;transition:color 0.2s}
.back-link:hover{color:var(--gold)}
.diag-header{margin-bottom:48px;padding-bottom:32px;border-bottom:1px solid var(--border-line)}
.exam-tag{display:inline-block;font-family:'Noto Serif KR',serif;color:var(--gold);font-size:0.78rem;letter-spacing:3px;margin-bottom:14px}
.diag-title{font-family:'Noto Serif KR',serif;font-weight:700;font-size:1.85rem;color:var(--cream);margin-bottom:14px;letter-spacing:-0.5px;line-height:1.3}
.diag-sub{color:var(--text-secondary);font-size:0.95rem;line-height:1.85}

/* ─── Step indicator ─── */
.step-bar{display:flex;gap:12px;margin-bottom:48px;flex-wrap:wrap}
.step{flex:1;min-width:120px;padding:14px 18px;background:var(--bg-card);border:1px solid var(--border-line);border-radius:5px;font-size:0.82rem;color:var(--text-muted);position:relative}
.step.active{background:var(--bg-card-hover);border-color:var(--gold);color:var(--cream)}
.step.done{background:rgba(74,90,58,0.3);border-color:var(--green-deep);color:var(--text-secondary)}
.step-num{font-family:'Noto Serif KR',serif;color:var(--gold);font-size:0.7rem;letter-spacing:2px;display:block;margin-bottom:4px;font-weight:500}
.step-label{font-size:0.88rem;font-weight:400}
.step.active .step-label{font-weight:500}

/* ─── Form ─── */
.section{background:var(--bg-card);border:1px solid var(--border-line);border-radius:6px;padding:36px;margin-bottom:24px}
.section-title{font-family:'Noto Serif KR',serif;font-weight:500;font-size:1.15rem;color:var(--cream);margin-bottom:8px;letter-spacing:-0.3px}
.section-desc{color:var(--text-secondary);font-size:0.9rem;line-height:1.75;margin-bottom:28px}
.form-row{display:flex;flex-direction:column;gap:8px;margin-bottom:22px}
.form-row label{font-size:0.86rem;color:var(--text-secondary);font-weight:400}
.form-row label .req{color:var(--gold);margin-left:3px}
.form-row input[type="text"],.form-row input[type="number"],.form-row select{background:var(--bg-dark);border:1px solid var(--border-line);border-radius:4px;padding:12px 16px;color:var(--cream);font-family:inherit;font-size:0.95rem;transition:border-color 0.15s}
.form-row input:focus,.form-row select:focus{outline:none;border-color:var(--gold)}
.form-row .hint{font-size:0.78rem;color:var(--text-muted);margin-top:4px}
.radio-group{display:flex;gap:12px;flex-wrap:wrap}
.radio-pill{flex:1;min-width:140px;padding:13px 16px;background:var(--bg-dark);border:1px solid var(--border-line);border-radius:4px;cursor:pointer;text-align:center;transition:all 0.15s;color:var(--text-secondary);font-size:0.92rem}
.radio-pill input{display:none}
.radio-pill:hover{border-color:var(--border-soft);color:var(--cream)}
.radio-pill.selected{border-color:var(--gold);background:rgba(95,198,163,0.08);color:var(--cream)}

/* ─── Answer marking ─── */
.area-block{margin-bottom:32px}
.area-title{font-family:'Noto Serif KR',serif;color:var(--gold);font-size:0.9rem;letter-spacing:2px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.area-title .sub{color:var(--text-muted);font-size:0.78rem;margin-left:10px;letter-spacing:0;font-weight:300}
.q-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:10px}
.q-item{display:flex;align-items:center;gap:10px;background:var(--bg-dark);border:1px solid var(--border-line);border-radius:4px;padding:10px 12px;cursor:pointer;transition:all 0.15s;user-select:none}
.q-item:hover{border-color:var(--border-soft)}
.q-item.wrong{background:rgba(198,102,102,0.12);border-color:var(--danger);color:var(--cream)}
.q-num{font-weight:500;font-size:0.92rem;min-width:34px;color:var(--cream)}
.q-three{font-size:0.7rem;color:var(--gold-soft);font-weight:500;margin-left:auto}
.q-wr{font-size:0.7rem;color:var(--text-muted);margin-left:auto}
.q-item.wrong .q-wr{color:var(--cream);opacity:0.7}
.q-cc{font-size:0.68rem;color:var(--text-muted);margin-left:auto;text-align:right;line-height:1.25;max-width:62%;word-break:keep-all}
.q-item.wrong .q-cc{color:var(--cream);opacity:0.75}

/* ─── Study survey ─── */
.time-survey{display:flex;flex-direction:column;gap:32px}
.tq{padding-bottom:24px;border-bottom:1px solid var(--border-line)}
.tq:last-child{border-bottom:none;padding-bottom:0}
.tq-num{display:inline-block;font-family:'Noto Serif KR',serif;color:var(--gold);font-size:0.78rem;letter-spacing:2px;margin-bottom:8px}
.tq-q{font-size:0.96rem;color:var(--cream);margin-bottom:16px;line-height:1.65;font-weight:400}
.tq-opts{display:flex;flex-direction:column;gap:8px}
.tq-opt{padding:12px 16px;background:var(--bg-dark);border:1px solid var(--border-line);border-radius:4px;cursor:pointer;color:var(--text-secondary);font-size:0.9rem;transition:all 0.15s}
.tq-opt input{display:none}
.tq-opt:hover{border-color:var(--border-soft);color:var(--cream)}
.tq-opt.selected{border-color:var(--gold);background:rgba(95,198,163,0.08);color:var(--cream)}
.tq-date{color-scheme:dark;background:var(--bg-dark);border:1px solid var(--border-line);border-radius:4px;padding:12px 16px;color:var(--cream);font-family:inherit;font-size:1rem;width:100%;max-width:240px}
.tq-date:focus{outline:none;border-color:var(--gold)}

/* ─── Buttons ─── */
.btn-row{display:flex;gap:12px;justify-content:space-between;margin-top:36px;flex-wrap:wrap}
.btn{padding:14px 32px;border:1px solid var(--border-soft);background:transparent;color:var(--text-primary);border-radius:4px;font-family:inherit;font-size:0.95rem;cursor:pointer;transition:all 0.15s;font-weight:400;letter-spacing:0.5px}
.btn-primary{background:var(--gold);color:var(--bg-dark);border-color:var(--gold);font-weight:500}
.btn-primary:hover{background:var(--gold-soft);border-color:var(--gold-soft)}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn:disabled{opacity:0.4;cursor:not-allowed}

/* ─── Result ─── */
.result-hero{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:6px;padding:36px;margin-bottom:24px;text-align:center}
.result-name{font-family:'Noto Serif KR',serif;font-size:1.65rem;color:var(--cream);font-weight:500;margin-bottom:8px}
.result-meta{color:var(--text-muted);font-size:0.85rem;letter-spacing:0.5px}
.score-block{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin:32px 0}
.score-card{background:var(--bg-dark);border:1px solid var(--border-line);border-radius:5px;padding:24px;text-align:center}
.score-label{font-size:0.78rem;color:var(--text-muted);letter-spacing:2px;margin-bottom:10px}
.score-num{font-family:'Noto Serif KR',serif;color:var(--gold);font-weight:700;font-size:2.5rem;line-height:1;margin-bottom:8px}
.score-num-sub{color:var(--text-secondary);font-size:0.85rem}
.diag-section{background:var(--bg-card);border:1px solid var(--border-line);border-radius:6px;padding:32px;margin-bottom:20px}
.diag-section-title{font-family:'Noto Serif KR',serif;color:var(--gold);font-size:0.9rem;letter-spacing:2.5px;margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid var(--border-soft)}
.pattern{padding:18px 0;border-bottom:1px solid var(--border-line)}
.pattern:last-child{border-bottom:none}
.pattern-name{font-family:'Noto Serif KR',serif;color:var(--cream);font-size:1.05rem;font-weight:500;margin-bottom:10px}
.pattern-name .code{color:var(--gold);font-size:0.78rem;margin-right:10px;letter-spacing:1.5px}
.pattern-name .hits{color:var(--text-muted);font-size:0.78rem;margin-left:10px;font-weight:400;letter-spacing:0}
.pattern-diag{color:var(--text-secondary);font-size:0.9rem;line-height:1.78;margin-bottom:10px}
.pattern-action{color:var(--cream);font-size:0.88rem;line-height:1.78;padding:14px 18px;background:rgba(95,198,163,0.05);border-left:2px solid var(--gold);border-radius:0 4px 4px 0}
.pattern-action::before{content:'처방';font-family:'Noto Serif KR',serif;font-size:0.68rem;color:var(--gold);letter-spacing:2px;display:block;margin-bottom:6px;font-weight:500}
/* 강점 카드(녹색 계열) */
.strength{padding:16px 18px;border:1px solid var(--border-line);border-left:2px solid var(--ok);border-radius:0 4px 4px 0;background:rgba(125,152,99,0.06);margin-bottom:12px}
.strength:last-child{margin-bottom:0}
.strength-name{font-family:'Noto Serif KR',serif;color:var(--cream);font-size:1rem;font-weight:500;margin-bottom:6px}
.strength-name .code{color:var(--ok);font-size:0.74rem;margin-right:9px;letter-spacing:1.5px}
.strength-name .area{color:var(--text-muted);font-size:0.74rem;margin-left:9px;font-weight:400}
.strength-diag{color:var(--text-secondary);font-size:0.88rem;line-height:1.75}
.q-detail{padding:16px 0;border-bottom:1px solid var(--border-line)}
.q-detail:last-child{border-bottom:none}
.q-detail-head{display:flex;align-items:baseline;gap:14px;margin-bottom:10px;flex-wrap:wrap}
.q-detail-num{font-family:'Noto Serif KR',serif;color:var(--gold);font-weight:500;font-size:1.1rem}
.q-detail-area{color:var(--text-muted);font-size:0.78rem;letter-spacing:1.5px}
.q-detail-source{color:var(--text-secondary);font-size:0.85rem;font-weight:400}
.q-detail-three{font-size:0.7rem;color:var(--gold-soft);padding:2px 8px;border:1px solid var(--gold-soft);border-radius:8px}
.q-detail-wr{font-size:0.78rem;color:var(--text-muted);margin-left:auto}
.q-detail-core{color:var(--cream);font-size:0.92rem;font-weight:500;margin-bottom:8px;line-height:1.65}
.q-detail-weak{color:var(--text-secondary);font-size:0.86rem;line-height:1.78;margin-bottom:8px}
.q-detail-rem{color:var(--text-secondary);font-size:0.86rem;line-height:1.78;padding:10px 14px;background:rgba(244,237,224,0.03);border-radius:3px;border-left:2px solid var(--green-deep)}
.q-detail-rem::before{content:'보완 방향';display:block;font-family:'Noto Serif KR',serif;font-size:0.68rem;color:var(--ok);letter-spacing:2px;margin-bottom:5px;font-weight:500}
.empty-msg{text-align:center;color:var(--text-muted);padding:32px 0;font-size:0.9rem;font-style:italic}

/* ─── Submit feedback ─── */
.submit-msg{text-align:center;padding:24px;border-radius:5px;margin-top:24px;font-size:0.92rem}
.submit-ok{background:rgba(125,152,99,0.1);border:1px solid var(--ok);color:var(--cream)}
.submit-err{background:rgba(198,102,102,0.1);border:1px solid var(--danger);color:var(--cream)}

/* ─── Mobile ─── */
@media (max-width:640px){
  .wrap{padding:40px 16px 60px}
  .title{font-size:1.55rem}.lead{font-size:0.94rem}
  .exam-card{padding:24px 22px}.card-name{font-size:1.15rem}
  .card-body{grid-template-columns:1fr;gap:18px}.card-arrow{display:none}
  .header{margin-bottom:48px;padding-bottom:36px}
  .diag-title{font-size:1.45rem}.section{padding:24px 22px}
  .step-bar{gap:6px}.step{padding:10px 12px;font-size:0.78rem;min-width:80px}.step-label{font-size:0.78rem}
  .q-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
  .q-item{padding:8px 10px;font-size:0.85rem}
  .btn-row{flex-direction:column-reverse}.btn{width:100%}
  .score-block{grid-template-columns:1fr 1fr}.score-num{font-size:2rem}
}
@media print{
  body{background:#fff;color:#000}
  .header,.back-bar,.diag-header,.btn-row,#submitFeedback,.loading,.exam-list,.section-label,.footer{display:none !important}
  .result-hero,.score-block,.diag-section{break-inside:avoid;page-break-inside:avoid}
  .pattern,.q-detail,.strength{break-inside:avoid;page-break-inside:avoid}
  .score-card{border:1px solid #888 !important;background:#fff !important}
  .pattern,.q-detail{background:#f8f8f8 !important;color:#000 !important}
  .pattern-action,.q-detail-rem,.strength{background:#fff !important;border:1px solid #888 !important}
  *{box-shadow:none !important;text-shadow:none !important}
}
/* 숙제 함/안 함/안 가져옴 */
.hw-choice{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap}
.hw-btn{flex:1 1 180px;padding:16px 12px;border-radius:12px;border:1.5px solid var(--border-line,rgba(255,255,255,.12));background:rgba(255,255,255,.03);color:var(--text-secondary,#9fb0b8);font-size:1.05rem;font-weight:600;cursor:pointer;transition:.15s}
.hw-btn:hover{border-color:var(--gold,#5fc6a3)}
.hw-btn.on{background:var(--gold,#5fc6a3);color:#10211b;border-color:var(--gold,#5fc6a3)}
.hw-btn.undone.on{background:#d6a96a;color:#241a0c;border-color:#d6a96a}
.hw-btn.forgot.on{background:#cbab6a;color:#241f0c;border-color:#cbab6a}
/* 완료 체크리스트 */
.chk-group{padding:16px 18px}
.chk-date{font-family:'Noto Serif KR',serif;font-weight:700;color:var(--gold,#5fc6a3);font-size:0.95rem;margin-bottom:10px;letter-spacing:0.5px}
.chk-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:9px;border:1px solid var(--border-line,rgba(255,255,255,.08));margin-bottom:7px;cursor:pointer;transition:.12s}
.chk-item:hover{border-color:rgba(95,198,163,.5)}
.chk-item.on{background:rgba(95,198,163,.12);border-color:rgba(95,198,163,.55)}
.chk-item input[type=checkbox]{width:20px;height:20px;accent-color:#5fc6a3;flex-shrink:0;cursor:pointer}
.chk-type{font-size:0.72rem;font-weight:700;padding:3px 9px;border-radius:9px;flex-shrink:0}
.chk-type.read{background:rgba(214,138,138,.18);color:#e0a3a3}
.chk-type.lit{background:rgba(134,201,168,.18);color:#86c9a8}
.chk-name{font-size:0.95rem;color:var(--cream,#e8eef0);line-height:1.4}
.chk-item.on .chk-name{font-weight:600}
.chk-count{text-align:center;font-size:1.05rem;font-weight:700;color:var(--gold,#5fc6a3);margin:18px 0 4px}
/* N제 '안 풂' 토글 */
.notsolved-btn{margin-left:auto;font-size:0.78rem;font-weight:700;padding:5px 13px;border-radius:11px;border:1.5px solid rgba(214,138,138,.5);background:transparent;color:#d6a96a;cursor:pointer;transition:.12s}
.notsolved-btn:hover{border-color:#d6a96a}
.notsolved-btn.on{background:#d68a8a;color:#241010;border-color:#d68a8a}
.q-grid.grid-disabled{opacity:0.35;pointer-events:none;filter:grayscale(0.6)}
.notsolved-note{margin-top:10px;font-size:0.85rem;color:#d6a96a;font-weight:600}
/* 재검사 방법 */
.oath-method{margin:18px 0 4px;padding:18px 20px;border-radius:10px;background:rgba(95,198,163,.08);border:1px solid rgba(95,198,163,.3)}
.oath-method>label{display:block;font-weight:700;color:var(--cream,#e8eef0);font-size:1.1rem;margin-bottom:10px}
.oath-method .hw-btn{font-size:1rem;padding:14px 12px}
/* 각서 */
.oath-stamp-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin:10px 0 4px;position:relative}
.oath-emoji{font-size:3rem;line-height:1}
.oath-seal{width:88px;height:88px;border-radius:50%;border:4px solid #c0392b;color:#c0392b;display:flex;align-items:center;justify-content:center;transform:rotate(-12deg);font-family:'Noto Serif KR',serif;font-weight:700;font-size:1.6rem;letter-spacing:4px;box-shadow:inset 0 0 0 2px rgba(192,57,43,.35)}
.oath-box{border:1.5px solid rgba(214,169,106,.4);background:rgba(214,169,106,.05)}
.oath-title{font-family:'Noto Serif KR',serif;font-size:2rem;font-weight:700;text-align:center;letter-spacing:12px;margin:4px 0 22px;color:var(--cream,#e8eef0)}
.oath-body{font-size:1.2rem;line-height:2.05;color:var(--cream,#e8eef0);font-weight:500}
.oath-body b{color:#fff}
.oath-body .oath-name{color:var(--gold,#5fc6a3);font-size:1.3rem;font-weight:700;border-bottom:2px solid var(--gold,#5fc6a3);padding:0 8px}
.oath-due{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:26px 0 4px;padding:18px 20px;border-radius:10px;background:rgba(95,198,163,.08);border:1px solid rgba(95,198,163,.3)}
.oath-due label{font-weight:700;color:var(--cream,#e8eef0);font-size:1.1rem}
.oath-due input[type=date]{font-family:'Noto Sans KR',sans-serif;padding:12px 16px;border-radius:10px;border:1.5px solid var(--gold,#5fc6a3);background:var(--bg-dark,#13181d);color:var(--cream,#e8eef0);font-size:1.3rem;font-weight:600;letter-spacing:1px}
.oath-due input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.85) sepia(1) saturate(4) hue-rotate(110deg) brightness(1.1);cursor:pointer;font-size:1.3rem;opacity:1;padding:2px}
.oath-due-fmt{color:var(--gold,#5fc6a3);font-weight:700;font-size:1.25rem}
.oath-note{margin-top:18px;padding:14px 16px;border-radius:10px;background:rgba(95,198,163,.08);border:1px dashed rgba(95,198,163,.4);font-size:.92rem;line-height:1.7;color:var(--text-secondary,#9fb0b8)}
/* 순위 */
.rank-line{margin:18px 0 8px;padding:14px 18px;border-radius:12px;background:rgba(95,198,163,.1);border:1px solid rgba(95,198,163,.3);font-size:1.15rem;text-align:center;color:var(--cream,#e8eef0)}
.rank-line b{color:var(--gold,#5fc6a3);font-size:1.3rem}
.rank-line .rank-sub{display:block;font-size:.8rem;color:var(--text-muted,#6f818b);margin-top:4px;font-weight:400}
</style>
</head>
<body>
<div class="loading" id="loading"><div class="loading-mark">오름 국어</div></div>
<img class="corner-logo" alt="" onerror="this.style.display='none'">
<div class="wrap" id="root" style="display:none"></div>

<script src="config.js"></script>
<script src="data/courses.js"></script>
<script>
// ─────────────────── Globals ───────────────────
let SCRIPT_URL = null, DASH_PASSWORD = null;
let BRAND = '오름 국어 연구소', TEACHER = '가경T', LOGO_URL = '';
const COURSES = window.COURSE_LIST || [];
const root = document.getElementById('root');

const STATE = {
  view: 'courses',     // 'courses' | 'months' | 'weeks' | 'diag'
  courseId: null,
  monthKey: null,      // 월별 강좌일 때 선택한 월 key (없으면 평면 강좌)
  monthLabel: null,
  week: null,          // 시트 전송용 고유 주차값(월별이면 합성값)
  data: null,          // 주차 JSON
  step: 1,
  student: { name:'', school:'', grade:'고3' },
  wrong: new Set(),    // 틀린 문항 번호(문자열)
  studyAns: {},        // 학습 진단 설문 응답 {번호: 보기index}
  result: null,
  autoSubmitted: false,
  teacherView: false
};

// ─────────────────── Helpers ───────────────────
function el(tag, attrs={}, ...children){
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='class') e.className=v;
    else if(k==='onclick'||k==='oninput'||k==='onchange') e[k]=v;
    else if(k==='html') e.innerHTML=v;
    else e.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c==null) return;
    if(typeof c==='string'||typeof c==='number') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
}
function clear(node){ while(node.firstChild) node.removeChild(node.firstChild); }
function escapeHtml(s){ return String(s||'').replace(/[<>&"]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }
function statusClass(s){ return s==='active'?'status-active':(s==='closed'?'status-closed':'status-tentative'); }
function statusLabel(s){ return s==='active'?'진행중':(s==='closed'?'마감':'준비중'); }

function loadConfig(){
  return new Promise(resolve=>{
    const c = window.OREUM_HW_CONFIG;
    if(c){
      SCRIPT_URL = c.SCRIPT_URL || null;
      DASH_PASSWORD = c.DASH_PASSWORD || null;
      BRAND = c.BRAND || BRAND;
      TEACHER = c.TEACHER || TEACHER;
      LOGO_URL = c.LOGO_URL || '';
    }
    resolve();
  });
}

// ─────────────────── View 1: 수업 목록 ───────────────────
function renderCourses(){
  STATE.view='courses'; STATE.courseId=null; STATE.monthKey=null; STATE.monthLabel=null; STATE.week=null; STATE.data=null;
  document.body.classList.add('landing');
  clear(root);
  const brandMark = el('div',{class:'brand-row'});
  if(LOGO_URL){
    const logo = el('img',{class:'brand-logo', src:LOGO_URL, alt:BRAND});
    // logo.png 가 아직 없으면 텍스트 브랜드로 자동 대체
    logo.onerror = ()=>{ brandMark.innerHTML=''; brandMark.appendChild(el('div',{class:'brand-name'}, BRAND)); };
    brandMark.appendChild(logo);
  } else {
    brandMark.appendChild(el('div',{class:'brand-name'}, BRAND));
  }
  const header = el('header',{class:'header'},
    brandMark,
    el('h1',{class:'title',html:'방학 과제 <span class="title-accent">검사 시스템</span>'}),
    el('p',{class:'lead',html:'수강 중인 강의를 선택하세요.<br>주차별 과제는 이 시스템을 바탕으로 검사할 것이며,<br>학생의 오답을 바탕으로 국어 학습 상황 및 성향 등의 진단도 진행됩니다.'})
  );
  root.appendChild(header);
  root.appendChild(el('div',{class:'section-label'},'수업 목록'));

  if(!COURSES.length){
    root.appendChild(el('div',{class:'error-box'},'등록된 수업이 없습니다. data/courses.js 를 확인해 주세요.'));
    return;
  }
  const list = el('div',{class:'exam-list'});
  COURSES.forEach((c, idx)=>{
    const card = el('button',{class:'exam-card', onclick:()=>openCourse(c.id)});
    const isMonthly = !!(c.months && c.months.length);
    const unit = isMonthly ? '개월' : '주차';
    const total = isMonthly ? c.months.length : (c.weeks||[]).length;
    const activeN = isMonthly ? c.months.filter(m=>m.status!=='tentative').length : (c.weeks||[]).filter(w=>w.status!=='tentative').length;
    card.appendChild(el('div',{class:'card-top'},
      el('div',{class:'card-meta-left'},
        el('span',{class:'card-num'}, 'COURSE '+String(idx+1).padStart(2,'0')),
        el('span',{class:'card-grade'}, c.grade||'전체'),
        el('span',{class:'card-status '+statusClass('active')}, (c.period||'운영중'))
      ),
      el('span',{class:'card-arrow'},'→')
    ));
    card.appendChild(el('div',{class:'card-name'}, c.name));
    if(c.desc) card.appendChild(el('div',{class:'card-date'}, c.desc));
    card.appendChild(el('div',{class:'card-body'},
      el('div',{class:'card-body-block'},
        el('span',{class:'body-label'}, isMonthly?'구성':'주차'),
        el('span',{class:'body-value',html:`<strong>${total}${unit}</strong> 구성 · ${activeN}${unit} 진행`})
      ),
      el('div',{class:'card-body-block'},
        el('span',{class:'body-label'},'대상'),
        el('span',{class:'body-value',html:`<strong>${escapeHtml(c.grade||'전체')}</strong>`})
      )
    ));
    list.appendChild(card);
  });
  root.appendChild(list);
  appendFooter();
}

// ─────────────────── 강좌 진입 분기 (월별 vs 평면) ───────────────────
function openCourse(courseId){
  const course = COURSES.find(c=>c.id===courseId);
  if(!course){ renderCourses(); return; }
  if(course.months && course.months.length) renderMonths(courseId);
  else renderWeeks(courseId);
}

// ─────────────────── View: 월 목록 (월별 강좌) ───────────────────
function renderMonths(courseId){
  const course = COURSES.find(c=>c.id===courseId);
  if(!course){ renderCourses(); return; }
  STATE.view='months'; STATE.courseId=courseId; STATE.monthKey=null;
  document.body.classList.remove('landing');
  clear(root);
  root.appendChild(el('div',{class:'back-bar'}, el('button',{class:'back-link',onclick:renderCourses},'← 수업 선택으로')));
  root.appendChild(el('div',{class:'diag-header'},
    el('span',{class:'exam-tag'},'수업 · 월 선택'),
    el('h1',{class:'diag-title'}, course.name),
    el('p',{class:'diag-sub'}, (course.desc||'')+' · 검사할 월을 선택해 주세요.')
  ));
  const months = course.months||[];
  if(!months.length){ root.appendChild(el('div',{class:'error-box'},'아직 등록된 월이 없습니다.')); appendFooter(); return; }
  const list = el('div',{class:'exam-list'});
  months.forEach((m,i)=>{
    const tentative = m.status==='tentative';
    const wkN = (m.weeks||[]).filter(w=>w.status!=='tentative').length;
    const card = el('button',{class:'exam-card', onclick: tentative?(()=>alert('아직 준비 중인 월입니다.')):(()=>renderWeeks(courseId, m.key))});
    if(tentative) card.style.opacity='0.6';
    card.appendChild(el('div',{class:'card-top'},
      el('div',{class:'card-meta-left'},
        el('span',{class:'card-num'}, 'MONTH '+String(i+1).padStart(2,'0')),
        el('span',{class:'card-status '+statusClass(m.status)}, statusLabel(m.status))
      ),
      el('span',{class:'card-arrow'},'→')
    ));
    card.appendChild(el('div',{class:'card-name'}, m.month || m.key));
    if(m.desc) card.appendChild(el('div',{class:'card-desc'}, m.desc));
    card.appendChild(el('div',{class:'card-body'},
      el('div',{class:'card-body-block'},
        el('span',{class:'body-label'},'주차'),
        el('span',{class:'body-value',html:`<strong>${(m.weeks||[]).length}주차</strong> 구성 · ${wkN}주차 진행`})
      ),
      el('div',{class:'card-body-block'},
        el('span',{class:'body-label'},'대상'),
        el('span',{class:'body-value',html:`<strong>${escapeHtml(course.grade||'전체')}</strong>`})
      )
    ));
    list.appendChild(card);
  });
  root.appendChild(list);
  appendFooter();
}

// ─────────────────── View 2: 주차 목록 (평면/월별 공용) ───────────────────
function renderWeeks(courseId, monthKey){
  const course = COURSES.find(c=>c.id===courseId);
  if(!course){ renderCourses(); return; }
  STATE.view='weeks'; STATE.courseId=courseId;
  document.body.classList.remove('landing');
  let weeks, month=null, backFn;
  if(monthKey && course.months){
    month = course.months.find(m=>m.key===monthKey);
    if(!month){ renderMonths(courseId); return; }
    STATE.monthKey = monthKey; STATE.monthLabel = month.month||monthKey;
    weeks = month.weeks||[]; backFn = ()=>renderMonths(courseId);
  } else {
    STATE.monthKey = null; STATE.monthLabel = null;
    weeks = course.weeks||[]; backFn = renderCourses;
  }
  clear(root);
  root.appendChild(el('div',{class:'back-bar'}, el('button',{class:'back-link',onclick:backFn}, month?'← 월 선택으로':'← 수업 선택으로')));
  root.appendChild(el('div',{class:'diag-header'},
    el('span',{class:'exam-tag'}, month? (course.name+' · '+month.month) : '수업 · 주차 선택'),
    el('h1',{class:'diag-title'}, month? (month.month+' 과제') : course.name),
    el('p',{class:'diag-sub'}, (month? (month.desc||course.name) : (course.desc||''))+' · 진단할 주차를 선택해 주세요.')
  ));
  if(!weeks.length){ root.appendChild(el('div',{class:'error-box'},'아직 등록된 주차가 없습니다.')); appendFooter(); return; }
  const list = el('div',{class:'exam-list'});
  weeks.forEach(w=>{
    const tentative = w.status==='tentative';
    const card = el('button',{class:'exam-card', onclick: tentative?(()=>alert('아직 준비 중인 주차입니다.')):(()=>loadWeek(courseId, monthKey||null, w.week))});
    if(tentative) card.style.opacity='0.6';
    card.appendChild(el('div',{class:'card-top'},
      el('div',{class:'card-meta-left'},
        el('span',{class:'card-num'}, 'WEEK '+String(w.week).padStart(2,'0')),
        w.area ? el('span',{class:'card-grade'}, w.area) : null,
        el('span',{class:'card-status '+statusClass(w.status)}, statusLabel(w.status)),
        w.date ? el('span',{class:'card-date'}, '검사일 '+w.date) : null
      ),
      el('span',{class:'card-arrow'},'→')
    ));
    card.appendChild(el('div',{class:'card-name'}, w.label || (w.week+'주차')));
    list.appendChild(card);
  });
  root.appendChild(list);
  appendFooter();
}

function loadWeek(courseId, monthKey, week){
  const course = COURSES.find(c=>c.id===courseId);
  let w, weekUid;
  if(monthKey && course.months){
    const mi = course.months.findIndex(m=>m.key===monthKey);
    const month = course.months[mi];
    w = month && (month.weeks||[]).find(x=>x.week===week);
    weekUid = (mi+1)*100 + week;   // 월별 고유·정렬용 합성 주차값(예: 9월=1번째→101,102 / 10월→201)
  } else {
    w = (course.weeks||[]).find(x=>x.week===week);
    weekUid = week;
  }
  if(!w){ openCourse(courseId); return; }
  document.getElementById('loading').style.display='flex';
  fetch(w.file + '?v=' + Date.now()).then(r=>r.json()).then(d=>{
    document.getElementById('loading').style.display='none';
    STATE.data = d;
    STATE.week = monthKey ? weekUid : (d.week!=null ? d.week : week);
    STATE.step = 1; STATE.wrong = new Set(); STATE.checked = new Set(); STATE.notSolved = new Set(); STATE.studyAns = {}; STATE.result = null;
    STATE.autoSubmitted = false; STATE.teacherView = false; STATE.didHw = null; STATE.oathMethod = null;
    renderDiag();
  }).catch(err=>{
    document.getElementById('loading').style.display='none';
    alert('숙제 데이터를 불러오지 못했습니다: '+err.message);
  });
}

// ─────────────────── View 3: 진단 4스텝 ───────────────────
function renderDiag(){
  STATE.view='diag';
  document.body.classList.remove('landing');
  clear(root);
  const course = COURSES.find(c=>c.id===STATE.courseId);
  const wm = STATE.data.weekMeta;
  root.appendChild(el('div',{class:'back-bar'},
    el('button',{class:'back-link',onclick:()=>renderWeeks(STATE.courseId, STATE.monthKey)},'← 주차 선택으로')
  ));
  root.appendChild(el('div',{class:'diag-header'},
    el('span',{class:'exam-tag'}, (course?course.name:'') + ' · 숙제 진단'),
    el('h1',{class:'diag-title'}, wm.label),
    el('p',{class:'diag-sub'}, '4단계 진단 — 기본 정보 → 오답 마킹 → 과제 점검 → 진단 리포트')
  ));
  if(STATE.step==='oath'){
    root.appendChild(el('div',{class:'step-bar'}, stepEl(1,'기본 정보'), el('div',{class:'step active'}, el('span',{class:'step-num'},'STEP 2'), el('span',{class:'step-label'},'각서 작성'))));
    renderOath();
    window.scrollTo(0,0); return;
  }
  const mk = (STATE.data.sections||[]).some(s=>(s.questions||[]).length);
  const cl = !!(STATE.data && STATE.data.checklist);
  // 순수 체크리스트형(오답 없음): 기본정보 → 완료 체크 → 결과 (3단계)
  if(cl && !mk){
    root.appendChild(el('div',{class:'step-bar'},
      el('div',{class:STATE.step===1?'step active':'step done'}, el('span',{class:'step-num'},'STEP 1'), el('span',{class:'step-label'},'기본 정보')),
      el('div',{class:STATE.step===2?'step active':(STATE.step>2?'step done':'step')}, el('span',{class:'step-num'},'STEP 2'), el('span',{class:'step-label'},'완료 체크')),
      el('div',{class:STATE.step===4?'step active':'step'}, el('span',{class:'step-num'},'STEP 3'), el('span',{class:'step-label'},'진단 결과'))
    ));
    if(STATE.step===1) renderStep1();
    else if(STATE.step===2) renderChecklist();
    else if(STATE.step===4) renderStep4();
    window.scrollTo(0,0); return;
  }
  // 일반 흐름 (+이매진 있으면 오답 마킹 다음에 '이매진 체크' 단계 삽입)
  const sEl=(num,label,active,done)=>el('div',{class:active?'step active':(done?'step done':'step')}, el('span',{class:'step-num'},'STEP '+num), el('span',{class:'step-label'},label));
  const isImg = STATE.step==='imagine';
  const bar=[];
  if(cl){
    bar.push(sEl(1,'기본 정보', STATE.step===1, STATE.step!==1));
    bar.push(sEl(2,'오답 마킹', STATE.step===2, isImg||STATE.step===3||STATE.step===4));
    bar.push(sEl(3,'이매진 체크', isImg, STATE.step===3||STATE.step===4));
    bar.push(sEl(4,'과제 점검', STATE.step===3, STATE.step===4));
    bar.push(sEl(5,'진단 결과', STATE.step===4, false));
  } else {
    bar.push(stepEl(1,'기본 정보'), stepEl(2,'오답 마킹'), stepEl(3,'과제 점검'), stepEl(4,'진단 결과'));
  }
  root.appendChild(el('div',{class:'step-bar'}, ...bar));
  if(STATE.step===1) renderStep1();
  else if(STATE.step===2) renderStep2();
  else if(STATE.step==='imagine') renderChecklist();
  else if(STATE.step===3) renderStep3();
  else if(STATE.step===4) renderStep4();
  window.scrollTo(0,0);
}
function stepEl(n,label){
  const cls = STATE.step===n?'step active':(STATE.step>n?'step done':'step');
  return el('div',{class:cls}, el('span',{class:'step-num'},'STEP '+n), el('span',{class:'step-label'},label));
}

function formRow(label, type, name, value, hint, opts){

function nextFromStep1(){

function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function dueRange(){ const t=new Date(); t.setHours(0,0,0,0); const m=new Date(t); m.setDate(m.getDate()+7); const f=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); return {min:f(t), max:f(m)}; }
function fmtKDate(v){ if(!v) return ''; const d=new Date(v+'T00:00:00'); if(isNaN(d.getTime())) return ''; const days=['일','월','화','수','목','금','토']; return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일 '+days[d.getDay()]+'요일'; }

function submitOath(){
  const forgot = STATE.didHw==='forgot';
  const due = (document.getElementById('oathDue')||{}).value || '';
  if(!due) return alert(forgot?'재검사 일자를 선택해 주세요.':'숙제 완료 기한 날짜를 선택해 주세요.');
  if(forgot && !STATE.oathMethod) return alert('재검사 방법을 선택해 주세요. (대면 / 카톡으로 영상)');
  const fb = document.getElementById('oathFeedback'), btn = document.getElementById('oathSubmitBtn');
  const dueK = fmtKDate(due), s = STATE.student, course = COURSES.find(c=>c.id===STATE.courseId), wm = STATE.data.weekMeta;
  if(!SCRIPT_URL || SCRIPT_URL.includes('PASTE_YOUR')){ if(fb) fb.innerHTML='<div class="submit-msg submit-err">시스템 설정 오류입니다. 관리자에게 문의해 주세요.</div>'; return; }
  if(btn){ btn.disabled=true; btn.textContent='제출 중...'; }
  const oathType = forgot?'forgot':'undone';
  const reason = forgot ? ('숙제 미지참 — 재검사 각서 ('+STATE.oathMethod+')') : '숙제 안 함 — 각서 작성';
  // 1) 미완 기록(제출 시트)
  const rec = { timestamp:new Date().toISOString(), courseId:STATE.courseId, courseLabel:course?course.name:'',
    week:STATE.week, weekLabel:wm.label, month:wm.month||STATE.monthLabel||'', name:s.name, school:s.school, grade:s.grade,
    완수상태:'아직 시작 못 함', 완수예정일:dueK, 미완사유:reason, 성실도:'', 제출방식:'각서' };
  postForm_(rec);
  // 2) 각서 문자 자동발송(서버가 명단에서 본인 번호로 학부모+학생 발송)
  let body='action=oathSend&type='+oathType+'&name='+encodeURIComponent(s.name)+'&dueDate='+encodeURIComponent(dueK)+'&courseId='+encodeURIComponent(STATE.courseId);
  if(forgot) body+='&method='+encodeURIComponent(STATE.oathMethod);
  fetch(SCRIPT_URL, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'}, body:body })
    .then(r=>r.json()).then(d=>{
      if(btn) btn.textContent='제출 완료 ✓';
      const okMsg = forgot
        ? ('재검사 각서가 제출되고 학부모님과 본인에게 문자가 발송되었습니다. '+dueK+' · '+STATE.oathMethod+'(으)로 재검사 꼭 받아요.')
        : ('각서가 제출되고 학부모님과 본인에게 문자가 발송되었습니다. 약속한 '+dueK+'까지 꼭 끝내요.');
      if(fb){ fb.innerHTML='';
        if(d.ok && !d.dryRun) fb.appendChild(el('div',{class:'submit-msg submit-ok'}, okMsg));
        else if(d.ok && d.dryRun) fb.appendChild(el('div',{class:'submit-msg submit-ok'},'각서가 제출되었습니다. (문자 발송은 관리자 설정 후 동작합니다)'));
        else fb.appendChild(el('div',{class:'submit-msg submit-err'},'각서는 기록됐지만 문자 발송에 실패했어요: '+(d.error||'')+'. '+TEACHER+'에게 알려주세요.'));
      }
    }).catch(e=>{ if(fb) fb.innerHTML='<div class="submit-msg submit-err">전송 오류: '+e.message+'</div>'; if(btn){ btn.disabled=false; btn.textContent='각서 제출 + 문자 발송'; } });
}
function postForm_(data){
  const iframe=document.createElement('iframe'); iframe.name='hwpost_'+Date.now(); iframe.style.display='none'; document.body.appendChild(iframe);
  const form=document.createElement('form'); form.method='POST'; form.action=SCRIPT_URL; form.target=iframe.name;
  Object.entries(data).forEach(([k,v])=>{ const i=document.createElement('input'); i.type='hidden'; i.name=k; i.value=String(v); form.appendChild(i); });
  document.body.appendChild(form); form.submit();
  setTimeout(()=>{ try{ document.body.removeChild(form); document.body.removeChild(iframe);}catch(e){} }, 3000);
}

  ));

function secKeyOf(sec, i){ return String((sec&&sec.key) || (sec&&sec.title) || i); }
function toggleNotSolved(secKey){
  if(STATE.notSolved.has(secKey)) STATE.notSolved.delete(secKey);
  else {
    STATE.notSolved.add(secKey);
    // 안 풂으로 표시하면 그 회차 오답 마킹 제거 (안 풀었으니 오답 없음)
    (STATE.data.sections||[]).forEach((s,i)=>{ if(secKeyOf(s,i)===secKey) (s.questions||[]).forEach(q=>STATE.wrong.delete(String(q.no))); });
  }
  renderDiag();
}
function areaBlock(sec, si){
  const secKey = secKeyOf(sec, si);
  const questions = sec.questions||[];
  const title = (sec.title||'문항') + (sec.range?` (${sec.range})`:'');
  const notSolved = STATE.notSolved.has(secKey);
  const block = el('div',{class:'section area-block'});
  block.appendChild(el('div',{class:'area-title'}, title,
    el('span',{class:'sub'}, questions.length+'문항'),
    el('button',{type:'button', class:'notsolved-btn'+(notSolved?' on':''), onclick:()=>toggleNotSolved(secKey)}, notSolved?'✓ 안 풂':'안 풂')
  ));
  const grid = el('div',{class:'q-grid'+(notSolved?' grid-disabled':'')});
  questions.forEach(q=>{
    const key = String(q.no);
    const item = el('div',{class: STATE.wrong.has(key)?'q-item wrong':'q-item'},
      el('span',{class:'q-num'}, q.label || (q.no+'번')),
      q.three ? el('span',{class:'q-three'},'3점') : null,
      (q.wr!=null) ? el('span',{class:'q-wr'}, q.wr+'%') : (q.area ? el('span',{class:'q-cc'}, q.area) : null)
    );
    item.onclick = ()=>{
      if(STATE.notSolved.has(secKey)) return;   // 안 풂이면 마킹 불가
      if(STATE.wrong.has(key)) STATE.wrong.delete(key); else STATE.wrong.add(key);
      item.classList.toggle('wrong');
    };
    grid.appendChild(item);
  });
  block.appendChild(grid);
  if(notSolved) block.appendChild(el('div',{class:'notsolved-note'},'이 회차는 ‘안 풂’으로 표시됐어요 — 과제 해결 정도에 반영됩니다.'));
  return block;
}

    el('h2',{class:'section-title'},'과제 점검'),
    el('p',{class:'section-desc'},'이번 과제를 어떻게 했는지 점검합니다. 다 못 했어도 솔직하게 — 대신 언제까지 끝낼지 약속해 주세요.')
  ));
  const surveyBox = el('div',{class:'section'});
  const surveyList = el('div',{class:'time-survey'});
  const items = STATE.data.studyCheck||[];
  const controllers = new Set(items.filter(t=>t.showIf).map(t=>t.showIf.q));
  let qno=0;
  items.forEach(tq=>{
    if(tq.tag==='duePledge') return;   // 추상 약속('다음 수업 전까지' 등) 제거 — 완수 예정일(날짜)로만 받음
    if(tq.showIf){ const av=STATE.studyAns[String(tq.showIf.q)]; if(av==null || av < (tq.showIf.minIndex||1)) return; }
    qno++;
    const tqBlock = el('div',{class:'tq'}, el('span',{class:'tq-num'},'Q '+qno), el('p',{class:'tq-q'}, tq.q));
    if(tq.type==='date'){
      const today=new Date(); today.setHours(0,0,0,0); const maxD=new Date(today); maxD.setDate(maxD.getDate()+7);
      const fmtd=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      const inp = el('input',{type:'date', class:'tq-date', value:(STATE.studyAns[String(tq.num)]||''), min:fmtd(today), max:fmtd(maxD)});
      inp.onchange = ()=>{ STATE.studyAns[String(tq.num)] = inp.value; };
      tqBlock.appendChild(el('div',{class:'tq-opts'}, inp));
      tqBlock.appendChild(el('div',{class:'hint', style:'margin-top:8px;color:#d6a96a'},'※ 오늘부터 7일 이내 날짜로 반드시 선택해야 다음으로 넘어갑니다.'));
    } else {
      const opts = el('div',{class:'tq-opts'});
      (tq.opts||[]).forEach((opt, idx)=>{
        const selected = STATE.studyAns[String(tq.num)]===idx;
        const item = el('label',{class: selected?'tq-opt selected':'tq-opt'}, el('input',{type:'radio',name:'tq'+tq.num,value:idx}), opt);
        item.onclick = ()=>{
          STATE.studyAns[String(tq.num)] = idx;
          opts.querySelectorAll('.tq-opt').forEach(o=>o.classList.remove('selected'));
          item.classList.add('selected');
          if(controllers.has(tq.num)) renderDiag();  // 완수 상태에 따라 조건부 문항 갱신
        };
        opts.appendChild(item);
      });
      tqBlock.appendChild(opts);
    }
    surveyList.appendChild(tqBlock);
  });
  surveyBox.appendChild(surveyList);
  root.appendChild(surveyBox);
  root.appendChild(el('div',{class:'btn-row'},
    el('button',{class:'btn btn-ghost', onclick:()=>{STATE.step=(STATE.data.checklist?'imagine':2); renderDiag();}},'← 이전'),
    el('button',{class:'btn btn-primary', onclick:goToResult},'진단 결과 보기 →')
  ));
}
function validateDue(){
  const items = STATE.data.studyCheck||[];
  const dq = items.find(x=>x.tag==='dueDate'); if(!dq) return true;
  if(dq.showIf){ const av=STATE.studyAns[String(dq.showIf.q)]; if(av==null || av < (dq.showIf.minIndex||1)) return true; } // 안 보이는 상황이면 통과
  const v = STATE.studyAns[String(dq.num)];
  if(!v){ alert('완수 예정일을 날짜로 반드시 선택해 주세요. (필수)'); return false; }
  const d=new Date(v+'T00:00:00'); const today=new Date(); today.setHours(0,0,0,0); const max=new Date(today); max.setDate(max.getDate()+7);
  if(isNaN(d.getTime()) || d<today || d>max){ alert('완수 예정일은 오늘부터 7일 이내 날짜로 선택해 주세요.'); return false; }
  return true;
}
function goToResult(){
  if(!STATE.teacherView && !validateDue()) return;
  STATE.result = computeResult();
  // 과제 해결 정도 10% 이하 → 사실상 '안 함' → 각서 작성
  if(!STATE.teacherView && STATE.result.solveRate!=null && STATE.result.solveRate<=10){
    alert('과제 해결 정도가 '+STATE.result.solveRate+'%예요. 거의 안 한 것으로 보여 각서를 작성하게 됩니다.');
    STATE.didHw='undone'; STATE.step='oath'; STATE.autoSubmitted=false; renderDiag(); return;
  }
  STATE.step = 4; STATE.autoSubmitted = false; STATE.teacherView = false;
  renderDiag();
}

function chkTotal(){ let n=0; ((STATE.data.checklist||{}).groups||[]).forEach(g=>n+=(g.items||[]).length); return n; }

function updateChkCount(){ const e=document.getElementById('chkCount'); if(!e)return; const t=chkTotal(); e.textContent='완료 '+STATE.checked.size+' / 전체 '+t+'개'; }
function computeChecklistData(){
  const total=chkTotal(), done=STATE.checked.size;
  const rate=total?Math.round(done/total*100):0;
  const doneItems=[], undoneItems=[];
  ((STATE.data.checklist||{}).groups||[]).forEach(g=>(g.items||[]).forEach(it=>{
    const lbl=(g.date?g.date.split('·')[0].trim()+' ':'')+'['+(it.type||'')+'] '+it.name;
    (STATE.checked.has(String(it.key))?doneItems:undoneItems).push(lbl);
  }));
  return { total, done, rate, doneItems, undoneItems };
}
function computeChecklistResult(){
  const c = computeChecklistData();
  const completed = c.total>0 && c.done===c.total;
  const dueRaw=(document.getElementById('chkDue')||{}).value||'';
  const label = completed?'전부 끝냄':(c.done===0?'아직 시작 못 함':(c.rate>=70?'대부분(70% 이상)':c.rate>=40?'절반쯤':'조금만(30% 이하)'));
  const completion = { doneIdx: completed?0:(c.done===0?4:2), doneLabel:label, completed, doneRate:c.rate,
    dueDate: dueRaw?fmtKDate(dueRaw):'', pledge:'', timeliness:'', reason:'' };
  return { totalPts:0, rawPts:0, total:0, correct:0, wrongN:0, rate:0, wrongDetails:[], patterns:[], strengths:[],
    areaStat:{}, studyDiag:[], diligence:null, completion, checklist:c, solveRate:c.rate, notSolvedTitles:[] };
}

// ─────────────────── 진단 계산 엔진 ───────────────────
function allQuestions(){
  const out = [];
  (STATE.data.sections||[]).forEach((sec,i)=>(sec.questions||[]).forEach(q=>out.push({...q, sectionKey:sec.key, sectionTitle:sec.title, _secKey:secKeyOf(sec,i)})));
  return out;
}
function computeResult(){
  const mk = (STATE.data.sections||[]).some(s=>(s.questions||[]).length);
  const cl = !!(STATE.data && STATE.data.checklist);
  if(cl && !mk) return computeChecklistResult();   // 순수 체크리스트
  const qs = allQuestions();
  let totalPts=0, rawPts=0, correct=0, solvedQ=0;
  const wrongDetails=[];
  qs.forEach(q=>{
    if(STATE.notSolved.has(q._secKey)) return;   // '안 풂' 회차 문항은 정답률 계산에서 제외
    const pts = q.points || (q.three?3:2);
    totalPts += pts; solvedQ++;
    if(STATE.wrong.has(String(q.no))){ wrongDetails.push({...q, score:pts}); }
    else { rawPts += pts; correct++; }
  });
  const total = solvedQ;   // 푼 문항만 정답률 모수
  const wrongN = wrongDetails.length;
  const rate = total ? Math.round((correct/total)*100) : 0;

  const patterns = matchPatterns(STATE.wrong, STATE.data.patternRules||[]);
  const areaStat = computeAreaStat(qs);
  let strengths = matchStrengths(STATE.wrong, STATE.data.strengthRules||[]);
  if(!strengths.length) strengths = fallbackStrength(areaStat);   // 강점 항상 발견
  const studyDiag = diagnoseStudy(STATE.studyAns, STATE.data.studyDiagnosticCodes||{});
  const diligence = diligenceScore(STATE.studyAns);
  const dIdx = studyGet(STATE.studyAns,'done');
  const completion = {
    doneIdx: dIdx, doneLabel: studyOpt('done', dIdx), completed: dIdx===0,
    doneRate: (dIdx!=null ? [100,85,50,25,0][dIdx] : null),
    dueDate: STATE.studyAns[String((STATE.data.studyCheck.find(x=>x.tag==='dueDate')||{}).num)]||'',
    pledge: studyOpt('duePledge', studyGet(STATE.studyAns,'duePledge')),
    timeliness: studyOpt('timeliness', studyGet(STATE.studyAns,'timeliness')),
    reason: studyOpt('reason', studyGet(STATE.studyAns,'reason'))
  };

  // ── 과제 해결 정도(%) — '안 풂' 회차 + 이매진 미체크 반영 ──
  let nSec=0, solvedSec=0; const notSolvedTitles=[];
  (STATE.data.sections||[]).forEach((s,i)=>{ if(!(s.questions||[]).length) return; nSec++;
    if(STATE.notSolved.has(secKeyOf(s,i))) notSolvedTitles.push(s.title||('회차'+(i+1))); else solvedSec++; });
  const imgTotal = cl ? chkTotal() : 0;
  const imgDone  = cl ? STATE.checked.size : 0;
  const totalUnits = nSec + imgTotal;
  const solveRate = totalUnits ? Math.round((solvedSec+imgDone)/totalUnits*100)
                               : (completion.doneRate!=null?completion.doneRate:null);

  const result = { totalPts, rawPts, total, correct, wrongN, rate, wrongDetails, patterns, strengths, areaStat, studyDiag, diligence, completion,
    solveRate, notSolvedTitles };
  if(cl) result.checklist = computeChecklistData();   // N제 + 이매진 조합: 이매진 완수율도 함께
  return result;
}
// 영역(area)/유형(type)별 정오 집계 — 대시보드·강약점 분석용
function computeAreaStat(qs){
  const byArea={};
  qs.forEach(q=>{
    const a = q.area || '기타';
    if(!byArea[a]) byArea[a]={total:0, wrong:0};
    byArea[a].total++;
    if(STATE.wrong.has(String(q.no))) byArea[a].wrong++;
  });
  return byArea;
}
function matchPatterns(wrongSet, rules){
  const out=[];
  for(const rule of rules){
    const t = rule.trigger||{};
    const hits = (t.questions||[]).filter(n=>wrongSet.has(String(n)));
    if(hits.length >= (t.minHits||1)){
      out.push({ code:rule.code, name:rule.name, priority:rule.priority||5, diag:rule.diag, action:rule.action,
        evidence:hits, severe: t.severeAt && hits.length>=t.severeAt });
    } else if(rule.fallback){
      const f = rule.fallback;
      const fHits = (f.questions||[]).filter(n=>wrongSet.has(String(n)));
      if(fHits.length >= (f.minHits||1)){
        out.push({ code:rule.code+'F', name:f.name||rule.name, priority:f.priority||(rule.priority||5)+5,
          diag:rule.diag, action:rule.action, evidence:fHits, severe:false });
      }
    }
  }
  out.sort((a,b)=>(a.priority||5)-(b.priority||5));
  return out.slice(0,6);
}
function matchStrengths(wrongSet, rules){
  const out=[];
  for(const rule of rules){
    const t = rule.trigger||{};
    const qList = t.questions||[];
    const wrongInRule = qList.filter(n=>wrongSet.has(String(n))).length;
    if(qList.length && wrongInRule <= (t.maxWrong||0)){
      out.push({ code:rule.code, name:rule.name, area:rule.area||'', diag:rule.diag });
    }
  }
  return out.slice(0,5);
}
// 강점이 하나도 안 잡힐 때 — 상대적으로 가장 잘한 영역을 강점으로
function fallbackStrength(areaStat){
  const arr=Object.entries(areaStat||{}).map(([a,v])=>({area:a,total:v.total,wrong:v.wrong,acc:v.total?(v.total-v.wrong)/v.total:0})).filter(x=>x.total>=2);
  arr.sort((a,b)=> b.acc-a.acc || b.total-a.total);
  const out=[];
  for(const x of arr){
    if(out.length>=2) break;
    if(x.acc>=0.6) out.push({code:'S+',name:x.area+' 영역',area:x.area,
      diag: x.wrong===0 ? (x.area+' 영역은 한 문제도 틀리지 않았어요. 확실한 강점입니다.')
        : (x.area+' 영역 정답률이 '+Math.round(x.acc*100)+'%로 가장 높아요. 상대적으로 가장 단단한 부분입니다.')});
  }
  if(!out.length && arr.length){ const x=arr[0]; out.push({code:'S+',name:x.area+' 영역',area:x.area,
    diag: x.area+' 영역이 그나마 가장 안정적이에요(정답률 '+Math.round(x.acc*100)+'%). 여기를 발판 삼아 약한 영역을 끌어올려 봅시다.'}); }
  return out;
}
// 과제 점검 설문 → 성실도·완수 진단
function studyGet(ans, tag){ const q=(STATE.data.studyCheck||[]).find(x=>x.tag===tag); return q?ans[String(q.num)]:undefined; }
function studyOpt(tag, idx){ const q=(STATE.data.studyCheck||[]).find(x=>x.tag===tag); return (q&&q.opts&&idx!=null)?q.opts[idx]:''; }
function fmtDate(s){ if(!s) return ''; const m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(s); return m? (parseInt(m[2],10)+'/'+parseInt(m[3],10)) : s; }
// 성실도 점수(0~100): 완수 + 제출시점 + 오답정리 + 최근추세
function diligenceScore(ans){
  const done=studyGet(ans,'done'), tl=studyGet(ans,'timeliness'), rv=studyGet(ans,'review'), tr=studyGet(ans,'trend');
  const sd=[40,30,20,10,0], st=[20,14,6,0], sr=[25,12,0], sg=[15,10,4,0];
  let s=0;
  s += (done!=null?sd[done]:0);
  s += (tl!=null?st[tl]:0);
  s += (rv!=null?sr[rv]:0);
  s += (tr!=null?sg[tr]:0);
  return Math.round(s);
}
function diagnoseStudy(ans, codes){
  const out=[];
  const push=(k,extra)=>{ if(codes[k]){ const o={label:codes[k].label, feedback:(extra?extra:codes[k].feedback)}; if(!out.find(x=>x.label===o.label)) out.push(o); } };
  const done=studyGet(ans,'done'), pledge=studyGet(ans,'duePledge'), due=ans[String((STATE.data.studyCheck.find(x=>x.tag==='dueDate')||{}).num)];
  const tl=studyGet(ans,'timeliness'), rv=studyGet(ans,'review'), tr=studyGet(ans,'trend'), reason=studyGet(ans,'reason');
  // 1) 완수 상태
  if(done===0) push('D_done');
  else if(done!=null){
    const dueTxt = due ? (fmtDate(due)+'까지 ') : '';
    const pleTxt = (pledge!=null)? ('('+studyOpt('duePledge',pledge)+') ') : '';
    const rsTxt = (reason!=null)? (' · 사유: '+studyOpt('reason',reason).split('(')[0].trim()) : '';
    const base = (done>=3) ? codes['D_undone'].feedback : codes['D_partial'].feedback;
    push(done>=3?'D_undone':'D_partial', dueTxt+pleTxt+base+rsTxt);
  }
  // 2) 제출 시점
  if(tl===2||tl===3) push('D_late');
  else if(tl===1) push('D_rush');
  else if(tl===0 && done===0) push('D_ontime');
  // 3) 오답 정리
  if(rv===0 && done===0) push('D_revfull');
  else if(rv===1||rv===2) push('D_norev');
  // 4) 최근 추세
  if(tr===2||tr===3) push('D_lagging');
  return out.slice(0,4);
}

    const c=r.checklist;
    const ib = el('div',{class:'diag-section'}, el('div',{class:'diag-section-title'}, '이매진 완료 — 완수율 '+c.rate+'% ('+c.done+'/'+c.total+'개)'));
    if(!c.undoneItems.length) ib.appendChild(el('p',{class:'empty-msg'},'이매진 항목 전부 완료했습니다. 훌륭해요!'));
    else { ib.appendChild(el('div',{class:'pattern-diag', style:'margin-bottom:8px'},'안 한 항목 '+c.undoneItems.length+'개:'));
      c.undoneItems.forEach(s=> ib.appendChild(el('div',{class:'pattern'}, el('div',{class:'pattern-name'}, s)))); }
    root.appendChild(ib);
  }

  // 제출
  const navButtons = [
    el('button',{class:'btn btn-ghost', onclick:()=>{STATE.step=3; renderDiag();}},'← 과제 점검으로'),
    el('button',{class:'btn btn-ghost', onclick:()=>window.print()},'PDF 저장 / 인쇄')
  ];
  if(!STATE.teacherView){
    navButtons.push(el('button',{class:'btn btn-primary', id:'submitBtn', onclick:()=>submitResult(true)},'결과 다시 보내기'));
  }
  root.appendChild(el('div',{class:'btn-row'}, ...navButtons));
  root.appendChild(el('div',{id:'submitFeedback'}));

  if(!STATE.teacherView && !STATE.autoSubmitted){
    setTimeout(()=>submitResult(false), 400);
  }
}
function scoreCard(label, num, sub){
  return el('div',{class:'score-card'},
    el('div',{class:'score-label'},label), el('div',{class:'score-num'},num), el('div',{class:'score-num-sub'},sub)
  );
}
// 같은 과제(수업+주차) 제출자 중 내 정답률 순위 — 누적 데이터 기준
function computeRank(){
  const rankEl = document.getElementById('rankLine'); if(!rankEl) return;
  if(!SCRIPT_URL || SCRIPT_URL.includes('PASTE_YOUR')){ rankEl.style.display='none'; return; }
  fetch(SCRIPT_URL+'?action=list&t='+Date.now()).then(r=>r.json()).then(d=>{
    const rows = Array.isArray(d)?d:(d.data||[]);
    const my = String(STATE.student.name||'').trim();
    const best = {};
    rows.forEach(row=>{
      if(String(row.courseId)!==String(STATE.courseId)) return;
      if(String(row.week)!==String(STATE.week)) return;
      const nm = String(row.name||'').trim(); if(!nm) return;
      const rt = Number(row['정답률']); if(isNaN(rt)) return;
      if(best[nm]==null || rt>best[nm]) best[nm]=rt;
    });
    best[my] = STATE.result.rate;                       // 나(최신) 포함
    const myRate = best[my]; let rank=1;
    Object.keys(best).forEach(n=>{ if(best[n]>myRate) rank++; });
    const N = Object.keys(best).length;
    rankEl.innerHTML = '🏆 전체 <b>'+N+'명</b> 중 <b>'+rank+'등</b> <span class="rank-sub">(같은 과제 · 정답률 기준 · 제출 누적)</span>';
  }).catch(()=>{ rankEl.style.display='none'; });
}

// ─────────────────── 제출 (시트 전송) ───────────────────
function submitResult(isManual){
  const btn = document.getElementById('submitBtn');
  const fb = document.getElementById('submitFeedback');
  if(!isManual && STATE.autoSubmitted) return;

  if(!SCRIPT_URL || SCRIPT_URL.includes('PASTE_YOUR')){
    if(isManual && fb){
      fb.innerHTML='';
      fb.appendChild(el('div',{class:'submit-msg submit-err'},'config.js의 SCRIPT_URL이 설정되지 않았습니다. 학원 관리자에게 문의해 주세요.'));
    }
    return;
  }
  if(fb) fb.innerHTML='';

  const r = STATE.result, s = STATE.student, wm = STATE.data.weekMeta;
  const course = COURSES.find(c=>c.id===STATE.courseId);
  const data = {
    timestamp: new Date().toISOString(),
    courseId: STATE.courseId,
    courseLabel: course?course.name:'',
    week: STATE.week,
    weekLabel: wm.label,
    month: wm.month || STATE.monthLabel || '',
    area: wm.area||'',
    name: s.name, school: s.school, grade: s.grade,
    원점수: r.rawPts, 만점: r.totalPts,
    정답률: r.rate, 맞은개수: r.correct, 틀린개수: r.wrongN, 총문항: r.total,
    틀린문항: Array.from(STATE.wrong).map(Number).sort((a,b)=>a-b).join(','),
    핵심패턴: r.patterns.map(p=>p.code+':'+p.name).join('|'),
    강점: r.strengths.map(s2=>s2.code+':'+s2.name).join('|'),
    학습진단: r.studyDiag.map(d=>d.label).join('|'),
    완수상태: r.completion?r.completion.doneLabel:'',
    완수예정일: r.completion?r.completion.dueDate:'',
    완수약속: r.completion?r.completion.pledge:'',
    제출시점: r.completion?r.completion.timeliness:'',
    미완사유: r.completion?r.completion.reason:'',
    성실도: (r.diligence!=null?r.diligence:''),
    제출방식: isManual?'재전송(수동)':'자동',
    patternsJson: JSON.stringify(r.patterns.map(p=>({code:p.code,name:p.name,diag:p.diag||'',action:p.action||'',hits:p.evidence||[]}))),
    strengthsJson: JSON.stringify(r.strengths),
    areaStatJson: JSON.stringify(r.areaStat),
    wrongDetailsJson: JSON.stringify(r.wrongDetails.map(q=>({
      no:q.no, area:q.area||'', type:q.type||'', source:q.source||'', three:!!q.three, wr:q.wr||null,
      coreElement:q.coreElement||'', weakness1:q.weakness1||'', weakness2:q.weakness2||'',
      remediation:q.remediation||'', parentNote:q.parentNote||''
    }))),
    studyDiagJson: JSON.stringify(r.studyDiag),
    studyAnsJson: JSON.stringify(STATE.studyAns),
    과제해결정도: (r.solveRate!=null ? r.solveRate+'%' : ''),
    안풂회차: (r.notSolvedTitles||[]).join(', '),
    이매진완수율: r.checklist ? (r.checklist.rate+'%') : '',
    체크리스트: r.checklist ? ('완료 '+r.checklist.done+'/'+r.checklist.total+(r.checklist.undoneItems.length?(' · 미완: '+r.checklist.undoneItems.join(', ')):'')) : ''
  };
  STATE.autoSubmitted = true;

  if(btn){ btn.disabled=true; btn.textContent = isManual?'전송 중...':'저장 중...'; }
  const iframe = document.createElement('iframe');
  iframe.name = 'submit_target_'+Date.now(); iframe.style.display='none';
  document.body.appendChild(iframe);
  const form = document.createElement('form');
  form.method='POST'; form.action=SCRIPT_URL; form.target=iframe.name;
  Object.entries(data).forEach(([k,v])=>{
    const inp=document.createElement('input'); inp.type='hidden'; inp.name=k; inp.value=String(v); form.appendChild(inp);
  });
  document.body.appendChild(form); form.submit();

  setTimeout(()=>{
    if(btn){ btn.textContent='결과 다시 보내기'; btn.disabled=false; }
    if(fb){
      fb.innerHTML='';
      fb.appendChild(el('div',{class:'submit-msg submit-ok'},'결과가 학원 시트에 저장되었습니다. '+TEACHER+'가 확인 후 피드백 드립니다. (전송이 안 된 것 같으면 위 버튼으로 다시 보낼 수 있어요.)'));
    }
    setTimeout(()=>{ try{ document.body.removeChild(form); document.body.removeChild(iframe);}catch(e){} }, 2000);
  }, 1200);
}

function appendFooter(){
  root.appendChild(el('div',{class:'footer'},
    el('span',{class:'footer-mark'}, BRAND),
    el('div',{html:TEACHER+' · 방학 과제 검사 시스템'})
  ));
}

// ─────────────────── Init ───────────────────
loadConfig().then(()=>{
  document.getElementById('loading').style.display='none';
  root.style.display='';
  // 내장 로고(config의 LOGO_URL=data URI)를 고정 코너 로고에 적용
  var _cl=document.querySelector('.corner-logo');
  if(_cl){ if(LOGO_URL) _cl.src=LOGO_URL; else _cl.style.display='none'; }
  const params = new URLSearchParams(location.search);
  // 강사용 결과 재현: ?report=courseId&week=1&name=..&school=..&wrong=1,2&study={...}
  const repCourse = params.get('report');
  if(repCourse){
    teacherReplay(repCourse, params);
    return;
  }
  renderCourses();
});

// 강사 대시보드에서 학생 결과를 그대로 재현(읽기 전용)
function teacherReplay(courseId, params){
  const week = parseInt(params.get('week')||'1',10);
  const course = COURSES.find(c=>c.id===courseId);
  const w = course && (course.weeks||[]).find(x=>x.week===week);
  if(!w){ renderCourses(); return; }
  fetch(w.file + '?v=' + Date.now()).then(r=>r.json()).then(d=>{
    STATE.data=d; STATE.courseId=courseId; STATE.week=week;
    STATE.student={ name:params.get('name')||'학생', school:params.get('school')||'', grade:params.get('grade')||'' };
    STATE.wrong = new Set((params.get('wrong')||'').split(',').map(s=>s.trim()).filter(Boolean));
    try{ STATE.studyAns = JSON.parse(params.get('study')||'{}'); }catch(e){ STATE.studyAns={}; }
    STATE.result = computeResult();
    STATE.step=4; STATE.teacherView=true; STATE.autoSubmitted=true;
    renderDiag();
  }).catch(()=>renderCourses());
}
